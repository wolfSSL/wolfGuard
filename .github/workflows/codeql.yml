name: CodeQL

on:
  push:
    branches: [ master ]
  pull_request:
  schedule:
    - cron: '23 5 * * 1'

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (C userland tools)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
      - name: Install dependencies and build wolfSSL (master)
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config
          git clone --depth 1 --branch master \
            https://github.com/wolfSSL/wolfssl.git "$HOME/wolfssl-src"
          cd "$HOME/wolfssl-src"
          ./autogen.sh
          ./configure --quiet --enable-wolfguard --enable-all-asm \
            --prefix="$HOME/wolfssl-install"
          make -j"$(nproc)"
          make install
      - name: Build wg-fips
        run: |
          export PKG_CONFIG_PATH="$HOME/wolfssl-install/lib/pkgconfig"
          make -C user-src -j"$(nproc)"
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"
